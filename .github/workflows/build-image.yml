
on:
  push:
      branches: [main]
  pull_request:
      branches: [main]
  workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    build-image:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Install Java 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: 'maven'
        - name: Build Docker image with Maven
          run: ./mvnw spring-boot:build-image -DskipTests

    update-gitops:
        needs: build-image
        runs-on: ubuntu-latest
        steps:
          - name: Cloner le dépôt d'infrastructure
            uses: actions/checkout@v4
            with:
              repository: arrow92500/kubernetes
              token: ${{ secrets.GITOPS_PAT }}
              path: kustomize
            
          - name: Mettre à jour la version de l'image
            working-directory: ./kustomize/overlays/dev
            run: |
              kustomize edit set image spring-petclinic=ghcr.io/${{ env.OWNER_LOWER }}/spring-petclinic:${{ github.sha }}
            
          - name: Commit et Push vers le dépôt d'infrastructure
            working-directory: ./kustomize/overlays/dev
            run: |
              git config user.name "GitHub Actions Bot"
              git config user.email "actions@github.com"
              git add .
              git commit -m "Auto-update image to tag ${{ github.sha }}"
              git push